services:
  backend:
    build:
      context: ./backend
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:19024,http://127.0.0.1:19024"
      SQLITE_PATH: "/data/db.sqlite3"
    ports:
      - "18033:8000"
    volumes:
      - backend_data:/data

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: "http://127.0.0.1:18033/api"
    ports:
      - "19024:5173"
    depends_on:
      - backend

volumes:
  backend_data:
